<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Legibility Score</title>
  <desc id="desc">Promotional hero image for the Agentic Legibility Score project, showing a seven-category scorecard for AI-agent readiness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#020617" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" rx="28" />
  <circle cx="1080" cy="112" r="140" fill="#1d4ed8" opacity="0.12" />
  <circle cx="160" cy="560" r="200" fill="#10b981" opacity="0.10" />

  <g transform="translate(72 78)">
    <rect x="0" y="0" width="168" height="34" rx="17" fill="#0f172a" stroke="#334155" />
    <text x="84" y="22" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">AI agent repo audit</text>

    <text x="0" y="96" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700">Agentic Legibility Score</text>
    <text x="0" y="144" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="28">Score any repo 0–100 on how well AI agents can operate inside it.</text>

    <g transform="translate(0 202)">
      <rect x="0" y="0" width="486" height="190" rx="24" fill="#0f172a" stroke="#23314f" />
      <text x="28" y="42" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">What you learn fast</text>
      <g fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">
        <text x="28" y="84">• Can an agent set this repo up cold?</text>
        <text x="28" y="120">• Can it find build, test, and lint paths?</text>
        <text x="28" y="156">• Will docs, CI, and security help or hurt?</text>
      </g>
    </g>

    <g transform="translate(0 424)">
      <rect x="0" y="0" width="184" height="54" rx="16" fill="#0f172a" stroke="#23314f" />
      <text x="92" y="34" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">7 categories</text>
      <rect x="204" y="0" width="248" height="54" rx="16" fill="#0f172a" stroke="#23314f" />
      <text x="328" y="34" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Zero runtime deps</text>
      <rect x="472" y="0" width="186" height="54" rx="16" fill="#0f172a" stroke="#23314f" />
      <text x="565" y="34" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">CLI + skill</text>
    </g>
  </g>

  <g transform="translate(760 72)" filter="url(#shadow)">
    <rect width="444" height="496" rx="28" fill="#f8fafc" />
    <rect x="0" y="0" width="444" height="70" rx="28" fill="#e2e8f0" />
    <text x="222" y="42" text-anchor="middle" fill="#0f172a" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">AGENTIC LEGIBILITY SCORECARD</text>
    <text x="40" y="110" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">example-repo</text>

    <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">
      <text x="40" y="158">Bootstrap &amp; Environment</text>
      <text x="40" y="204">Entry Points &amp; Commands</text>
      <text x="40" y="250">Documentation &amp; Navigation</text>
      <text x="40" y="296">Architecture &amp; Structure</text>
      <text x="40" y="342">Testing &amp; Validation</text>
      <text x="40" y="388">Code Quality Enforcement</text>
      <text x="40" y="434">Security &amp; Governance</text>
    </g>

    <g fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="end">
      <text x="392" y="158">13 / 15</text>
      <text x="392" y="204">12 / 15</text>
      <text x="392" y="250">17 / 20</text>
      <text x="392" y="296">11 / 15</text>
      <text x="392" y="342">13 / 15</text>
      <text x="392" y="388">9 / 10</text>
      <text x="392" y="434">8 / 10</text>
    </g>

    <g>
      <rect x="40" y="168" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="168" width="208" height="10" rx="5" fill="url(#accent)" />
      <rect x="40" y="214" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="214" width="192" height="10" rx="5" fill="url(#accent)" />
      <rect x="40" y="260" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="260" width="204" height="10" rx="5" fill="url(#accent)" />
      <rect x="40" y="306" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="306" width="176" height="10" rx="5" fill="url(#accent)" />
      <rect x="40" y="352" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="352" width="208" height="10" rx="5" fill="url(#accent)" />
      <rect x="40" y="398" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="398" width="216" height="10" rx="5" fill="url(#accent)" />
      <rect x="40" y="444" width="240" height="10" rx="5" fill="#e2e8f0" />
      <rect x="40" y="444" width="196" height="10" rx="5" fill="url(#accent)" />
    </g>

    <line x1="32" x2="412" y1="468" y2="468" stroke="#cbd5e1" />
    <text x="40" y="504" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">TOTAL</text>
    <text x="404" y="506" text-anchor="end" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">83 / 100  ·  A</text>
  </g>
</svg>
